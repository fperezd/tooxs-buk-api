services:
  - type: web
    name: tooxs-buk-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BUK_STARTER_BASE_URL
        sync: false
      - key: BUK_STARTER_API_TOKEN
        sync: false
      - key: BUK_STARTER_AUTH_HEADER
        value: Authorization
      - key: BUK_STARTER_AUTH_SCHEME
        value: Bearer
      - key: BUK_STARTER_LEGACY_AUTH_HEADER
        value: auth_token
      - key: BUK_STARTER_SEND_LEGACY_AUTH_HEADER
        value: "true"
      - key: SERVER_API_KEY
        sync: false
      - key: SELF_URL
        value: https://tooxs-buk-api.onrender.com
