openapi: 3.1.0
info:
  title: Tooxs BUK API
  description: Consulta información de empleados y planilla de Tooxs desde BUK en lenguaje natural
  version: 1.0.0
servers:
  - url: https://tooxs-buk-api.onrender.com
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Verifica que la API esté activa
      responses:
        "200":
          description: Estado del servicio
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: Ok!
                  mode:
                    type: string
                    example: starter
  /chat:
    post:
      operationId: consultarBUK
      summary: Envía un comando en lenguaje natural al agente BUK de Tooxs
      description: |
        Comandos disponibles (en español):
        - `empleados` — lista todos los empleados activos
        - `buscar empleado <nombre>` — busca empleados por nombre o apellido
        - `buscar empleado <nombre> en uf` — idem con sueldos en UF
        - `empleado <id>` — detalle de un empleado por ID
        - `empleado <id> en uf` — idem con sueldo en UF
        - `costo total planilla` — suma total de sueldos base
        - `costo total planilla en uf` — idem en UF con valor UF del día
        - `uf` / `valor uf` / `uf hoy` — valor oficial UF del día (Banco Central)
        - `ping` — verifica conectividad con BUK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: Comando en español dirigido al agente BUK
                  example: costo total planilla en uf
      responses:
        "200":
          description: Respuesta del agente en texto o JSON formateado
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: Resultado del comando, puede ser texto plano o JSON serializado
        "401":
          description: API Key inválida o ausente
        "400":
          description: Body inválido o campo message faltante
