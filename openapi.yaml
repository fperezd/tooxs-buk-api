openapi: 3.1.0
info:
  title: Tooxs BUK API
  version: 1.0.0
servers:
  - url: https://tooxs-buk-api.onrender.com
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Verifica que la API este activa
      responses:
        "200":
          description: Estado del servicio
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  mode:
                    type: string
  /chat:
    post:
      operationId: consultarBUK
      summary: Consulta empleados y planilla de Tooxs en lenguaje natural
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
      responses:
        "200":
          description: Respuesta del agente
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
      security:
        - ApiKeyAuth: []
